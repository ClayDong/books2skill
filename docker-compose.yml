version: '3.8'

services:
  books2skill:
    build:
      context: .
      target: production
    container_name: books2skill
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PROJECT_ROOT=/app
      - BOOKS_RAW_DIR=/app/data/books_raw
      - BOOKS_TXT_DIR=/app/data/books_txt
      - BOOKS_TXT_OCR_DIR=/app/data/books_txt_ocr
      - LIBRARY_DIR=/app/data/library
      - OUTPUT_DIR=/app/data/output
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/books2skill.log
    ports:
      - "8000:8000"  # For future web interface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["python", "-m", "books2skill", "serve"]  # Future web server

  books2skill-dev:
    build:
      context: .
      target: development
    container_name: books2skill-dev
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PROJECT_ROOT=/app
      - BOOKS_RAW_DIR=/app/data/books_raw
      - BOOKS_TXT_DIR=/app/data/books_txt
      - BOOKS_TXT_OCR_DIR=/app/data/books_txt_ocr
      - LIBRARY_DIR=/app/data/library
      - OUTPUT_DIR=/app/data/output
      - LOG_LEVEL=DEBUG
      - DEBUG=true
    ports:
      - "8001:8000"
    stdin_open: true
    tty: true
    command: ["python", "-m", "debugpy", "--listen", "0.0.0.0:5678", "-m", "books2skill"]

  books2skill-test:
    build:
      context: .
      target: testing
    container_name: books2skill-test
    volumes:
      - ./tests:/app/tests
      - ./coverage:/app/coverage
    environment:
      - PYTHONPATH=/app
      - COVERAGE_FILE=/app/coverage/.coverage
    command: ["python", "-m", "pytest", "tests/", "-v", "--cov=books2skill", "--cov-report=html", "--cov-report=term"]

  ocr-worker:
    build:
      context: .
      target: production
    container_name: books2skill-ocr-worker
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs/ocr
    environment:
      - ROLE=ocr_worker
      - OCR_USE_GPU=false
      - MAX_WORKERS=2
      - LOG_LEVEL=INFO
    command: ["python", "scripts/ocr_worker.py"]
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: books2skill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: books2skill-postgres
    environment:
      - POSTGRES_USER=books2skill
      - POSTGRES_PASSWORD=books2skill123
      - POSTGRES_DB=books2skill_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U books2skill"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
  postgres-data:
  data:
    driver: local
    driver_opts:
      type: none
      device: ./data
      o: bind

networks:
  default:
    name: books2skill-network
    driver: bridge
