# Simple pre-commit configuration for Books2Skill
repos:
  - repo: local
    hooks:
      - id: black
        name: Black code formatting
        entry: black
        language: system
        types: [python]
        args: [--check]

      - id: isort
        name: Isort import sorting
        entry: isort
        language: system
        types: [python]
        args: [--check-only, --profile=black]

      - id: flake8
        name: Flake8 linting
        entry: flake8
        language: system
        types: [python]
        args: [--max-line-length=88]

      - id: trailing-whitespace
        name: Trim trailing whitespace
        entry: sed
        language: system
        types: [text]
        args: ['-i', 's/[[:space:]]*$//']

      - id: end-of-file-fixer
        name: Ensure files end with newline
        entry: sed
        language: system
        types: [text]
        args: ['-i', '-e', '$a\\']
